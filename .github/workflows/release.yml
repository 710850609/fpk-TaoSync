name: Release fpk

on:
  push:
    tags:
      - '*'
  workflow_dispatch: {}

permissions:
  contents: write

env:
  NODE_VERSION: "18"
  PYTHON_VERSION: '3.11'

jobs:  
  # 主 job，负责设置变量
  setup:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set-tag.outputs.tag }}
      taosync_version: ${{ steps.set-tag.outputs.taosync_version }}
      release_version: ${{ steps.set-tag.outputs.release_version }}
      prerelease: ${{ steps.set-tag.outputs.prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set tag and prerelease info
        id: set-tag
        run: |        
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            jq \
            sed
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF##*/}"
            BuildVersion="${TAG##*-}"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            TaoSyncVersion=$(curl -s https://api.github.com/repos/dr34m-cn/taosync/releases/latest | jq -r .tag_name | sed 's/^v//')
            BuildVersion=$(sed -n 's/^[[:space:]]*build_version[[:space:]]*=[[:space:]]*\([^#[:space:]]*\).*/\1/p' "build.sh" | head -n1)
            TAG="${TaoSyncVersion}-${BuildVersion}"
          else
            TAG="build-${GITHUB_RUN_NUMBER}"
          fi
          
          if [[ "$TAG" == build-* ]] || [[ "${TAG}" == *dev* ]] || [[ "${TAG}" == *pre* ]] || [[ "${TAG}" == *beta* ]]; then
            PRE=true
          else
            PRE=false
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "taosync_version=$TaoSyncVersion" >> $GITHUB_OUTPUT
          echo "release_version=$TaoSyncVersion-$BuildVersion" >> $GITHUB_OUTPUT
          echo "prerelease=$PRE" >> $GITHUB_OUTPUT
          echo "设置发布标签: $TAG"
          echo "TaoSync版本: $TaoSyncVersion"
          echo "设置发布版本: $TaoSyncVersion-$BuildVersion"
          echo "预发布: $PRE"

