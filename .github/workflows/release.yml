  create-release:
    needs: 
      - setup
      - build-fpk
    runs-on: ubuntu-latest
    steps:
#      - name: Create release directory
#        run: |
#          mkdir -p combined-release

      - name: Download fpk artifact
        uses: actions/download-artifact@v4
        with:
          name: fpk
          path: artifacts

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            artifacts/*.fpk
          name: ${{ needs.setup.outputs.release_version }}
          tag: ${{ needs.setup.outputs.tag }}
          prerelease: ${{ needs.setup.outputs.prerelease }}
          skipIfReleaseExists: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release summary
        if: always()
        run: |
          echo "=== 发布总结 ==="
          echo "版本: ${{ needs.setup.outputs.release_version }}"
          echo "构建分支: ${{ needs.setup.outputs.tag }}"
          echo "预发布: ${{ needs.setup.outputs.prerelease }}"
          echo "包含的文件:"
          ls -la artifacts/
          echo "================"

      - name: Push FnDepot
        if: ${{ needs.setup.outputs.prerelease == 'false' }}
        run: |
          new_version="${{ needs.setup.outputs.release_version }}"
          changelog=""
        
          gh workflow run update-version.yml \
            --repo "710850609/FnDepot" \
            -f app_name="TaoSync" \
            -f new_version="$new_version" \
            -f download_url_amd64="https://github.com/710850609/fpk-TaoSync/releases/download/${new_version}/TaoSync-${new_version}-x86.fpk" \
            -f download_url_aarch64="https://github.com/710850609/fpk-TaoSync/releases/download/${new_version}/TaoSync-${new_version}-arm.fpk" \
            -f changelog="$changelog"
        env:
          GH_TOKEN: ${{ secrets.FNDEPOT_TOKEN }}